[cluster:vars]
# ── ICON paths (installed to /opt/, owned by ansible_user) ───────────────
icon_src_dir   = /opt/icon-model
icon_build_dir = /opt/icon-build
 
# ── Source repository ────────────────────────────────────────────────────
# Use the public HTTPS URL if you don't have a DKRZ GitLab account;
# switch to the SSH form (git@gitlab.dkrz.de:icon/icon-model.git) if you do.
icon_repo_url = https://gitlab.dkrz.de/icon/icon-model.git
 
# Pin to a specific branch or tag, or leave empty for the default branch.
icon_repo_version =
 
# ── Configure wrapper ────────────────────────────────────────────────────
# Path relative to icon_src_dir. Pick the wrapper that matches this machine.
# See icon_src_dir/config/ for available wrappers after cloning.
# Example for a generic Linux build:
icon_configure_wrapper = config/generic/gcc
 
# Any extra flags to pass to the configure wrapper (optional).
icon_configure_args =
 
# ── Build ────────────────────────────────────────────────────────────────
# Number of parallel make jobs. Tune to the core count of your nodes.
icon_make_jobs = 8
