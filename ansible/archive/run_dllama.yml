---
# Usage:
#   ansible-playbook run_dllama.yml -e "run_type=short"
#   ansible-playbook run_dllama.yml -e "run_type=long"
#   ansible-playbook run_dllama.yml -e "run_type=leaderboard"
#
# Workers must be started manually before running this playbook:
#   ssh orangepi@172.17.1.51 'nohup /home/orangepi/KUSC_2026-SBCC-Docs/DLLAMA/distributed-llama/dllama worker --port 9999 --nthreads 2 > /home/orangepi/dllama_worker.log 2>&1 &'
#   ssh orangepi@172.17.1.52 'nohup /home/orangepi/KUSC_2026-SBCC-Docs/DLLAMA/distributed-llama/dllama worker --port 9999 --nthreads 2 > /home/orangepi/dllama_worker.log 2>&1 &'
#   ssh orangepi@172.17.1.53 'nohup /home/orangepi/KUSC_2026-SBCC-Docs/DLLAMA/distributed-llama/dllama worker --port 9999 --nthreads 2 > /home/orangepi/dllama_worker.log 2>&1 &'
# Wait for all three to finish loading before running this playbook.
#
# ================================================================== #
- name: Run dllama inference on root
  hosts: dllama_root
  gather_facts: false
  vars:
    dllama_dir: /home/orangepi/KUSC_2026-SBCC-Docs/DLLAMA/distributed-llama
    prompts_dir: /home/orangepi/KUSC_2026-SBCC-Docs/DLLAMA/dllama-prompts
    output_base: /home/orangepi/KUSC_2026-SBCC-Docs/ansible/dllama-out
    model_name: llama3_1_8b_instruct_q40
    nthreads: 2
    max_seq_len: 4096
    worker_port: 9999
    run_type: "short"
    steps_map:
      short: 975
      long: 4000
      leaderboard: 6000
  tasks:
    - name: Set steps and output dir
      set_fact:
        steps: "{{ steps_map[run_type] }}"
        out_dir: "{{ output_base }}/{{ run_type }}"

    - name: Create output directory
      file:
        path: "{{ out_dir }}"
        state: directory
        mode: '0755'

    - name: Set prompt var
      set_fact:
        prompt: "{{ lookup('file', prompts_dir + '/' + run_type + '.txt') | trim }}"

    - name: Build worker address list from inventory
      set_fact:
        worker_addrs: >-
          {% for h in groups['dllama_nodes'] if h != groups['dllama_root'][0] -%}
          {{ h }}:{{ worker_port }}{{ " " if not loop.last else "" }}
          {%- endfor %}

    - name: Record start timestamp
      shell: TZ="America/Los_Angeles" date >> {{ out_dir }}/timestamps.txt

    - name: Write prompt to temp file
      copy:
        content: "{{ prompt }}"
        dest: /tmp/dllama_prompt.txt

    - name: Run inference benchmark
      shell: >
        {{ dllama_dir }}/dllama inference
        --model models/{{ model_name }}/dllama_model_{{ model_name }}.m
        --tokenizer models/{{ model_name }}/dllama_tokenizer_{{ model_name }}.t
        --buffer-float-type q80
        --nthreads {{ nthreads }}
        --max-seq-len {{ max_seq_len }}
        --prompt "$(cat /tmp/dllama_prompt.txt)"
        --steps {{ steps }}
        --workers {{ worker_addrs }}
        --temperature 0
        --seed 10042026
      args:
        chdir: "{{ dllama_dir }}"
      register: inference_output

    - name: Record end timestamp
      shell: TZ="America/Los_Angeles" date >> {{ out_dir }}/timestamps.txt

    - name: Write output.txt
      copy:
        content: "{{ inference_output.stdout }}"
        dest: "{{ out_dir }}/output.txt"

    - name: Write run.sh
      copy:
        content: |
          #!/bin/bash
          {{ dllama_dir }}/dllama inference \
            --model models/{{ model_name }}/dllama_model_{{ model_name }}.m \
            --tokenizer models/{{ model_name }}/dllama_tokenizer_{{ model_name }}.t \
            --buffer-float-type q80 \
            --nthreads {{ nthreads }} \
            --max-seq-len {{ max_seq_len }} \
            --prompt "{{ prompt }}" \
            --steps {{ steps }} \
            --workers {{ worker_addrs }} \
            --temperature 0 \
            --seed 10042026
        dest: "{{ out_dir }}/run.sh"
        mode: '0755'

    - name: Print inference output
      debug:
        msg: "{{ inference_output.stdout_lines }}"
